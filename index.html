<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8" />
<title>Formulário – Declaração</title>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: #111;
    margin: 0;
    padding: 24px;
  }

  .wrapper {
    max-width: 1000px;
    margin: 0 auto;
  }

  h2 {
    text-align: center;
    color: #EB0029;
    font-size: 26px;
    margin-bottom: 22px;
    font-weight: bold;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    border: 1px solid #e5e7eb;
    padding: 12px;
    vertical-align: top;
  }

  th {
    background: #EB0029;
    color: #fff;
    text-align: center;
    font-size: 15px;
  }

  tr:nth-child(even) td {
    background: #fafafa;
  }

  input[type="text"],
  input[type="email"],
  select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
    box-sizing: border-box;
  }

  button {
    background: #EB0029;
    color: white;
    padding: 14px 26px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    font-size: 17px;
    width: 100%;
  }

  #assin-cert {
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fafafa;
    padding: 16px;
    margin-top: 14px;
  }

  #assin-cert h3 {
    margin: 0 0 8px;
  }

  #hash {
    font-family: monospace;
    font-size: 12px;
    color: #555;
    margin-top: 8px;
    word-break: break-all;
  }

  #toast-box {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 12px;
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    box-shadow: 0 2px 6px rgba(0, 0, 0, .2);
  }

  .info {
    background: #2563eb;
  }

  .ok {
    background: #16a34a;
  }

  .err {
    background: #dc2626;
  }
</style>
</head>

<body>
<div class="wrapper">
  <h2>Formulário Declaratório</h2>

  <form id="formEnvio" method="POST" action="https://formspree.io/f/xqeygqoe">

    <!-- Campos ocultos para IP e device -->
    <input type="hidden" name="ipPublico" id="ipPublico">
    <input type="hidden" name="userAgent" id="userAgent">
    <input type="hidden" name="assinaturaHash" id="assinaturaHash">

    <table>
      <tr>
        <th>Pergunta</th>
        <th>Resposta</th>
      </tr>

      <tr>
        <td><strong>Nome Completo</strong></td>
        <td><input name="nome" id="nome" type="text" required></td>
      </tr>

      <tr>
        <td><strong>CPF</strong></td>
        <td><input name="cpf" id="cpf" type="text" required></td>
      </tr>

      <tr>
        <td><strong>Departamento</strong></td>
        <td><input name="departamento" id="departamento" type="text" required></td>
      </tr>

      <tr>
        <td><strong>E-mail Corporativo</strong></td>
        <td><input name="email" id="email" type="email" required></td>
      </tr>

      <tr>
        <td><strong>Cargo</strong></td>
        <td><input name="cargo" id="cargo" type="text" required></td>
      </tr>

      <!-- ASSINATURA CERTIFICADA -->
      <tr>
        <td><strong>Assinatura Certificada</strong></td>
        <td>

          <label><strong>Nome na Assinatura:</strong></label>
          <input name="assinaturaNome" id="assinaturaNome" type="text" required>

          <label style="margin-top:10px; display:block;"><strong>CPF:</strong></label>
          <input name="assinaturaCPF" id="assinaturaCPF" type="text" required>

          <div id="assin-cert">
            <h3>eSig — Assinatura Certificada</h3>

            <div><strong>Nome:</strong> <span id="prevNome">—</span></div>
            <div><strong>CPF:</strong> <span id="prevCPF">—</span></div>
            <div><strong>Data:</strong> <span id="prevData"></span></div>

            <div style="margin-top:10px;">
              <strong>Código de Certificação (SHA‑256):</strong>
              <div id="hash">—</div>
            </div>
          </div>

        </td>
      </tr>
    </table>

    <button type="button" onclick="enviarFormulario()">Enviar Formulário</button>
  </form>
</div>

<div id="toast-box"></div>

<script>
// --- DATA ---
document.getElementById("prevData").textContent =
  new Date().toLocaleString("pt-BR");

// --- CAPTURAR IP PÚBLICO ---
async function obterIPPublico() {
  try {
    let resp = await fetch("https://api.ipify.org?format=json");
    let data = await resp.json();
    document.getElementById("ipPublico").value = data.ip;
  } catch (e) {
    console.error("Erro ao obter IP público:", e);
  }
}

// Preencher o userAgent
document.getElementById("userAgent").value = navigator.userAgent;

// Chamar ao carregar
obterIPPublico();

// --- GERAR HASH ---
async function gerarHash(texto) {
  const enc = new TextEncoder().encode(texto);
  const hashBuffer = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

async function atualizar() {
  const n = document.getElementById("assinaturaNome").value.trim();
  const c = document.getElementById("assinaturaCPF").value.trim();
  const ip = document.getElementById("ipPublico").value;
  const ua = document.getElementById("userAgent").value;

  document.getElementById("prevNome").textContent = n || "—";
  document.getElementById("prevCPF").textContent = c || "—";

  if (n && c && ip) {
    const base = n + c + new Date().toISOString() + ip + ua;
    const hash = await gerarHash(base);
    document.getElementById("hash").textContent = hash;
    document.getElementById("assinaturaHash").value = hash;
  }
}

document.getElementById("assinaturaNome").addEventListener("input", atualizar);
document.getElementById("assinaturaCPF").addEventListener("input", atualizar);

// --- TOAST ---
function toast(msg, tipo = "info") {
  const box = document.getElementById("toast-box");
  const d = document.createElement("div");
  d.className = `toast ${tipo}`;
  d.textContent = msg;
  box.appendChild(d);
  setTimeout(() => d.remove(), 6000);
}

// --- BLOQUEIO OPCIONAL DE IP CORPORATIVO ---
const ipPermitidos = [
  // coloque aqui faixas ou IPs da sua empresa
  // "200.201.", "187.44.", "170.75.120."
];

function validarIP() {
  const ip = document.getElementById("ipPublico").value;
  if (!ip) return true;

  if (ipPermitidos.length === 0) return true;

  const ok = ipPermitidos.some(faixa => ip.startsWith(faixa));

  if (!ok) {
    toast("IP não autorizado para envio.", "err");
    return false;
  }
  return true;
}

// --- ENVIAR FORMULÁRIO ---
async function enviarFormulario() {
  const obrig = ["nome", "cpf", "email", "departamento", "cargo", "assinaturaNome", "assinaturaCPF"];
  const faltando = obrig.filter(id => !document.getElementById(id).value.trim());

  if (faltando.length) {
    toast("Preencha: " + faltando.join(", "), "err");
    return;
  }

  if (!validarIP()) return;

  toast("Enviando...", "info");

  const form = document.getElementById("formEnvio");
  const dados = new FormData(form);

  const resp = await fetch(form.action, {
    method: "POST",
    body: dados,
    headers: { "Accept": "application/json" }
  });

  if (resp.ok) {
    toast("Enviado com sucesso!", "ok");
    alert("✔ Formulário enviado!");
    form.reset();
    document.getElementById("hash").textContent = "—";
  } else {
    toast("Falha ao enviar.", "err");
  }
}
</script>

</body>
</html>
